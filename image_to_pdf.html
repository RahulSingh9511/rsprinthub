<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter - Print Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; overflow-x: hidden; }
        
        /* Premium Animated Background */
        .page-bg {
            background: linear-gradient(135deg, #ecfdf5 0%, #ccfbf1 50%, #e0e7ff 100%);
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Glassmorphism Design */
        .glass-box { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15); }
        
        /* Strict A4 Preview Box */
        .a4-preview {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1 / 1.414; /* Standard A4 Ratio */
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin: 0 auto;
            position: relative;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .upload-zone { border: 3px dashed #10b981; transition: all 0.3s ease; }
        .upload-zone:hover { background-color: #ecfdf5; border-color: #059669; transform: scale(1.02); }
        
        /* Scrollbar styles for thumbnails */
        .thumb-scroll::-webkit-scrollbar { height: 8px; }
        .thumb-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .thumb-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen page-bg">

    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 no-print border-b-4 border-emerald-500">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 bg-gray-100 text-gray-700 hover:bg-emerald-600 hover:text-white px-5 py-2 rounded-xl font-bold transition shadow-sm border border-gray-200">
                <i class="fa-solid fa-arrow-left"></i> Main Dashboard
            </a>
            <div class="font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-700 text-2xl flex items-center gap-2">
                <i class="fa-solid fa-file-pdf text-emerald-500"></i> Smart Image to PDF
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-6xl mx-auto p-4 md:p-8">
        
        <div id="uploadView" class="w-full max-w-3xl mx-auto glass-box rounded-3xl p-8 md:p-12 text-center mt-10">
            <div class="inline-block bg-emerald-100 text-emerald-700 font-bold px-5 py-1.5 rounded-full text-xs mb-6 uppercase tracking-widest shadow-sm border border-emerald-200">
                <i class="fa-solid fa-bolt text-amber-500 mr-1"></i> Fast PDF Converter
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-gray-800 mb-4 tracking-tight">Image to <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-600">A4 PDF</span></h1>
            <p class="text-gray-500 font-bold text-base mb-10">Upload any image (JPG, PNG). We will safely convert it into a high-quality A4 PDF for printing.</p>

            <label for="imageInput" class="upload-zone flex flex-col items-center justify-center w-full h-72 bg-white rounded-2xl cursor-pointer shadow-inner relative group">
                <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-5xl mb-4 shadow-md group-hover:scale-110 transition duration-300">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <h3 class="text-2xl font-black text-gray-800 mb-2">Click Here to Upload Image(s)</h3>
                <p class="text-sm font-bold text-emerald-600 bg-emerald-50 px-4 py-1 rounded-full border border-emerald-200">Select single or multiple images</p>
                <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="handleImageUpload(event)">
            </label>
        </div>

        <div id="workspaceView" class="hidden w-full glass-box rounded-3xl p-6 md:p-8 mt-4 shadow-2xl border-2 border-emerald-100">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-5 flex flex-col gap-6">
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                        <h3 class="font-black text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-sliders text-emerald-500 mr-2"></i> PDF Settings</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Page Orientation</label>
                                <select id="pdfOrientation" onchange="updatePreview()" class="w-full bg-gray-50 border border-gray-300 text-gray-800 rounded-lg p-2.5 font-bold outline-none cursor-pointer focus:border-emerald-500">
                                    <option value="p">Portrait (Vertical)</option>
                                    <option value="l">Landscape (Horizontal)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Image Margin / Border</label>
                                <select id="pdfMargin" onchange="updatePreview()" class="w-full bg-gray-50 border border-gray-300 text-gray-800 rounded-lg p-2.5 font-bold outline-none cursor-pointer focus:border-emerald-500">
                                    <option value="0">No Margin (Full Fit)</option>
                                    <option value="10">Small Margin</option>
                                    <option value="20">Large Margin</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex-grow">
                        <div class="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 class="font-black text-gray-800"><i class="fa-solid fa-images text-blue-500 mr-2"></i> Your Images</h3>
                            <button onclick="document.getElementById('imageInputMore').click()" class="text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-lg transition shadow"><i class="fa-solid fa-plus mr-1"></i> Add More</button>
                            <input type="file" id="imageInputMore" accept="image/*" multiple class="hidden" onchange="handleImageUpload(event)">
                        </div>
                        <div id="thumbContainer" class="flex flex-wrap gap-3 max-h-[300px] overflow-y-auto thumb-scroll pr-2">
                            </div>
                    </div>
                </div>

                <div class="lg:col-span-7 bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner flex flex-col items-center">
                    <h3 class="font-black text-gray-800 mb-2 text-xl">A4 Page Preview</h3>
                    <p class="text-xs font-bold text-gray-500 mb-6 bg-white px-4 py-1.5 rounded-full border border-gray-300">Exactly how your PDF will look</p>
                    
                    <div id="a4PreviewBox" class="a4-preview bg-white mb-8 relative">
                        <img id="mainPreviewImage" src="" style="width: 100%; height: 100%; object-fit: contain; padding: 0px;" class="transition-all duration-300">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-md">
                        <button onclick="executePDFAction('download')" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white py-4 rounded-xl font-black text-lg shadow-xl transition transform hover:-translate-y-1 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-download text-xl"></i> Save PDF
                        </button>
                        <button onclick="executePDFAction('print')" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-4 rounded-xl font-black text-lg shadow-xl transition transform hover:-translate-y-1 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-print text-xl"></i> Direct Print
                        </button>
                    </div>
                    
                    <button onclick="resetApp()" class="mt-6 text-sm font-bold text-red-500 hover:text-red-700 underline"><i class="fa-solid fa-trash-can mr-1"></i> Clear All Images</button>
                </div>

            </div>
        </div>

    </main>

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/95 z-[200] items-center justify-center flex-col backdrop-blur-sm">
        <i class="fa-solid fa-spinner fa-spin text-7xl text-emerald-500 mb-6"></i>
        <h2 class="text-3xl font-black text-gray-800">Processing PDF...</h2>
        <p class="text-gray-500 font-bold mt-2">Please wait a moment</p>
    </div>

    <script>
        let imagesArray = [];
        let currentIndex = 0;

        // 1. SAFE FILE UPLOAD
        function handleImageUpload(event) {
            const files = Array.from(event.target.files); 
            if(!files || files.length === 0) return;

            document.getElementById('uploadView').classList.add('hidden');
            document.getElementById('workspaceView').classList.remove('hidden');

            let filesProcessed = 0;
            const totalFiles = files.length;
            
            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagesArray.push({
                        id: Date.now() + Math.random(),
                        src: e.target.result,
                        name: file.name
                    });
                    filesProcessed++;
                    
                    if(filesProcessed === totalFiles) {
                        currentIndex = imagesArray.length - 1; 
                        renderThumbnails();
                        updatePreview();
                        event.target.value = ''; 
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        // 2. Render Thumbnails
        function renderThumbnails() {
            const container = document.getElementById('thumbContainer');
            container.innerHTML = "";

            if(imagesArray.length === 0) {
                resetApp();
                return;
            }

            imagesArray.forEach((img, index) => {
                const isSelected = (index === currentIndex);
                const thumb = document.createElement('div');
                thumb.className = `relative w-24 h-28 shrink-0 rounded-xl overflow-hidden cursor-pointer border-4 transition ${isSelected ? 'border-emerald-500 shadow-lg scale-105 z-10' : 'border-gray-200 hover:border-emerald-300'}`;
                thumb.onclick = () => { currentIndex = index; renderThumbnails(); updatePreview(); };
                
                thumb.innerHTML = `
                    <img src="${img.src}" class="w-full h-full object-cover bg-white">
                    <div class="absolute top-0 left-0 bg-black/80 text-white text-[10px] px-1 py-0.5 w-full text-center font-bold">${index + 1}</div>
                    <button onclick="removeImage(${index}); event.stopPropagation();" class="absolute bottom-1 right-1 bg-red-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center shadow hover:bg-red-800 transition"><i class="fa-solid fa-trash-can"></i></button>
                `;
                container.appendChild(thumb);
            });
        }

        // 3. Remove Image
        function removeImage(index) {
            imagesArray.splice(index, 1);
            if(currentIndex >= imagesArray.length) currentIndex = imagesArray.length - 1;
            if(currentIndex < 0) currentIndex = 0;
            renderThumbnails();
            updatePreview();
        }

        // 4. Update Big A4 Preview
        function updatePreview() {
            if(imagesArray.length === 0) return;
            
            const previewImg = document.getElementById('mainPreviewImage');
            const previewBox = document.getElementById('a4PreviewBox');
            
            const orientation = document.getElementById('pdfOrientation').value;
            const marginValue = document.getElementById('pdfMargin').value;
            
            if(orientation === 'l') {
                previewBox.style.aspectRatio = '1.414 / 1';
                previewBox.style.maxWidth = '550px';
            } else {
                previewBox.style.aspectRatio = '1 / 1.414';
                previewBox.style.maxWidth = '420px';
            }

            let paddingPx = (marginValue == 0) ? '0px' : (marginValue * 1.5) + 'px';
            previewImg.style.padding = paddingPx;
            previewImg.src = imagesArray[currentIndex].src;
        }

        // 5. Reset App
        function resetApp() {
            imagesArray = [];
            currentIndex = 0;
            document.getElementById('workspaceView').classList.add('hidden');
            document.getElementById('uploadView').classList.remove('hidden');
        }

        // 6. Core Action Engine (Download or Perfect Direct Print)
        async function executePDFAction(actionType) {
            if(imagesArray.length === 0) return alert("Please upload an image first.");

            const loader = document.getElementById('loadingOverlay');
            loader.classList.replace('hidden', 'flex');

            setTimeout(async () => {
                try {
                    const orientation = document.getElementById('pdfOrientation').value;
                    const margin = parseInt(document.getElementById('pdfMargin').value);
                    
                    if (actionType === 'download') {
                        // ---- PDF GENERATION LOGIC (For Download) ----
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF(orientation, 'mm', 'a4');
                        const pdfW = pdf.internal.pageSize.getWidth();
                        const pdfH = pdf.internal.pageSize.getHeight();
                        
                        const availW = pdfW - (margin * 2);
                        const availH = pdfH - (margin * 2);

                        for (let i = 0; i < imagesArray.length; i++) {
                            if (i > 0) pdf.addPage();
                            const imgSrc = imagesArray[i].src;
                            const imgProps = await new Promise((resolve) => {
                                const img = new Image();
                                img.onload = () => resolve({ w: img.width, h: img.height });
                                img.src = imgSrc;
                            });

                            const ratio = Math.min(availW / imgProps.w, availH / imgProps.h);
                            const finalW = imgProps.w * ratio;
                            const finalH = imgProps.h * ratio;
                            
                            const x = margin + (availW - finalW) / 2;
                            const y = margin + (availH - finalH) / 2;

                            pdf.addImage(imgSrc, 'JPEG', x, y, finalW, finalH);
                        }
                        pdf.save("PrintHub_Image_to_PDF.pdf");

                    } else if (actionType === 'print') {
                        // ---- NEW DIRECT PRINT LOGIC (100% Reliable via New Window) ----
                        // Browser security blocks iframe printing for PDFs, so we generate a clean HTML print window
                        
                        const printWindow = window.open('', '_blank');
                        if (!printWindow) {
                            alert("Popup blocked! Please allow popups for this site to print.");
                            return;
                        }

                        // Set correct dimensions based on orientation
                        const pageWidth = orientation === 'l' ? '297mm' : '210mm';
                        const pageHeight = orientation === 'l' ? '210mm' : '297mm';

                        let printHTML = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Print Document</title>
                            <style>
                                @page { size: A4 ${orientation === 'l' ? 'landscape' : 'portrait'}; margin: 0; }
                                body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                                .page-container { 
                                    width: ${pageWidth}; 
                                    height: ${pageHeight}; 
                                    display: flex; 
                                    align-items: center; 
                                    justify-content: center; 
                                    page-break-after: always;
                                    box-sizing: border-box;
                                    padding: ${margin}mm;
                                }
                                .page-container img {
                                    max-width: 100%;
                                    max-height: 100%;
                                    object-fit: contain;
                                }
                            </style>
                        </head>
                        <body>
                        `;

                        // Add all images as separate printable pages
                        imagesArray.forEach(img => {
                            printHTML += `<div class="page-container"><img src="${img.src}"></div>`;
                        });

                        printHTML += `
                            <script>
                                window.onload = function() {
                                    setTimeout(() => {
                                        window.print();
                                        window.close();
                                    }, 500); // Give images half a second to fully render
                                }
                            <\/script>
                        </body>
                        </html>
                        `;

                        printWindow.document.write(printHTML);
                        printWindow.document.close();
                    }

                } catch(e) {
                    console.error(e);
                    alert("Error processing your request.");
                } finally {
                    loader.classList.replace('flex', 'hidden');
                }
            }, 300); // UI delay for loader
        }
    </script>
</body>
</html>
