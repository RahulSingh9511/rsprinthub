<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID CREATOR - Advanced Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Advanced Canvas Engine for Drag/Drop & Editing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Oswald:wght@700&family=Dancing+Script&display=swap');
        
        body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        
        /* Header */
        .id-creator-header {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(to right, #2563eb, #db2777, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sidebar & Layout */
        .sidebar-item { cursor: pointer; transition: all 0.3s; border-left: 4px solid transparent; border-radius: 0 8px 8px 0; margin-right: 8px;}
        .sidebar-item:hover { background-color: rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; }
        .sidebar-item.active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%); border-left-color: #2563eb; color: #1d4ed8; font-weight: 800; }
        
        /* Template Gallery Cards */
        .template-card { cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        .template-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #3b82f6;}
        
        /* Editor Canvas */
        .canvas-container { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; background: white;}
        .workspace-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Emoji Grid */
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .emoji-item { font-size: 24px; cursor: pointer; text-align: center; padding: 5px; transition: transform 0.2s; }
        .emoji-item:hover { transform: scale(1.3); background: #f1f5f9; border-radius: 5px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- 1. HEADER -->
    <header class="glass-panel border-b-4 border-blue-600 flex justify-between items-center px-6 py-3 shrink-0 z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600 transition shadow-sm border border-gray-200 bg-white"><i class="fa-solid fa-house"></i></a>
            <h1 class="text-3xl font-black italic id-creator-header">ID CREATOR <span class="text-sm text-gray-500 not-italic ml-1 border-l-2 border-gray-300 pl-2">Pro Studio</span></h1>
        </div>
        <!-- Search Bar -->
        <div id="searchBarWrapper" class="hidden md:flex bg-white rounded-full border border-gray-300 px-4 py-2 items-center shadow-inner w-80 focus-within:ring-2 focus-within:ring-blue-400">
            <i class="fa-solid fa-search text-blue-500 mr-3"></i>
            <input type="text" id="searchInput" placeholder="Search templates (e.g. Doctor, School)..." class="outline-none w-full text-sm font-bold text-gray-700 bg-transparent">
        </div>
        <!-- Download Button (Hidden in Gallery) -->
        <button id="btnDownload" onclick="downloadCard()" class="hidden bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-6 py-2 rounded-xl font-black shadow-lg transition"><i class="fa-solid fa-download mr-2"></i> Save & Print</button>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- 2. SIDEBAR CATEGORIES (Always Visible) -->
        <aside id="sidebar" class="w-64 glass-panel border-r border-gray-200 flex flex-col overflow-y-auto no-scrollbar shrink-0 shadow-lg z-40">
            <div class="p-5 border-b border-gray-200 bg-white/50">
                <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest flex items-center"><i class="fa-solid fa-layer-group mr-2"></i> Categories</h3>
            </div>
            <ul class="flex flex-col py-3 gap-1" id="categoryList">
                <!-- Categories injected here -->
            </ul>
        </aside>

        <!-- ========================================================= -->
        <!-- 3. MAIN GALLERY WORKSPACE -->
        <!-- ========================================================= -->
        <main id="galleryWorkspace" class="flex-1 overflow-y-auto p-6 md:p-8 bg-gray-50">
            <div class="flex justify-between items-end mb-8 bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                <div>
                    <h2 id="currentCategoryTitle" class="text-3xl font-black text-gray-800 tracking-tight">All Templates</h2>
                    <p class="text-sm text-gray-600 font-bold mt-1">Select a premium design to edit, or start fresh.</p>
                </div>
                <button onclick="openEditor('blank')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-black shadow-md transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Create Blank Card
                </button>
            </div>

            <!-- Grid for Templates -->
            <div id="templateGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 pb-20">
                <!-- Templates injected via JS -->
            </div>
        </main>

        <!-- ========================================================= -->
        <!-- 4. ADVANCED EDITOR WORKSPACE (Hidden initially) -->
        <!-- ========================================================= -->
        <div id="editorWorkspace" class="absolute inset-0 bg-white z-50 hidden flex-row">
            
            <!-- Editor Left Toolbar -->
            <aside class="w-80 bg-white border-r border-gray-200 flex flex-col z-40 shadow-xl shrink-0">
                <div class="p-4 bg-gray-50 border-b flex items-center gap-3">
                    <button onclick="closeEditor()" class="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded-lg hover:bg-red-50 hover:text-red-600 font-bold text-xs shadow-sm transition"><i class="fa-solid fa-arrow-left mr-1"></i> Gallery</button>
                    <span class="font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 text-base">Editing Tools</span>
                </div>

                <div class="p-3 border-b border-gray-100 flex gap-2 overflow-x-auto no-scrollbar bg-white">
                    <button onclick="switchTab('text')" class="tool-tab px-3 py-2 text-xs font-bold bg-blue-50 text-blue-600 rounded-lg whitespace-nowrap"><i class="fa-solid fa-t mr-1"></i>Text</button>
                    <button onclick="switchTab('shapes')" class="tool-tab px-3 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded-lg whitespace-nowrap"><i class="fa-solid fa-shapes mr-1"></i>Shapes</button>
                    <button onclick="switchTab('emojis')" class="tool-tab px-3 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded-lg whitespace-nowrap"><i class="fa-regular fa-face-smile mr-1"></i>Stickers</button>
                    <button onclick="switchTab('bg')" class="tool-tab px-3 py-2 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded-lg whitespace-nowrap"><i class="fa-solid fa-fill-drip mr-1"></i>Bg</button>
                </div>

                <!-- Tabs Content -->
                <div class="flex-1 overflow-y-auto p-4 bg-gray-50 no-scrollbar">
                    
                    <!-- Text Tools -->
                    <div id="tab-text" class="tab-content space-y-4">
                        <button onclick="addText('Heading', 32, 'Arial', 'bold')" class="w-full bg-white border border-gray-200 p-3 rounded-lg shadow-sm hover:border-blue-400 text-xl font-bold text-gray-800 text-left">Add a Heading</button>
                        <button onclick="addText('Subheading', 22, 'Arial', 'normal')" class="w-full bg-white border border-gray-200 p-3 rounded-lg shadow-sm hover:border-blue-400 text-lg font-semibold text-gray-700 text-left">Add a Subheading</button>
                        <button onclick="addText('Little body text', 14, 'Arial', 'normal')" class="w-full bg-white border border-gray-200 p-3 rounded-lg shadow-sm hover:border-blue-400 text-sm text-gray-600 text-left">Add body text</button>
                        
                        <div class="border-t border-gray-200 pt-4 mt-4">
                            <label class="text-xs font-bold text-gray-500 uppercase block mb-2">Stylish Fonts</label>
                            <button onclick="addText('Premium ID', 36, 'Playfair Display', 'normal')" class="w-full bg-white border border-gray-200 p-2 rounded shadow-sm hover:border-blue-400 text-2xl mb-2 text-center" style="font-family: 'Playfair Display', serif;">Premium ID</button>
                            <button onclick="addText('OFFICIAL BADGE', 36, 'Oswald', 'bold')" class="w-full bg-white border border-gray-200 p-2 rounded shadow-sm hover:border-blue-400 text-2xl mb-2 text-center" style="font-family: 'Oswald', sans-serif;">OFFICIAL BADGE</button>
                            <button onclick="addText('Creative Pass', 36, 'Dancing Script', 'normal')" class="w-full bg-white border border-gray-200 p-2 rounded shadow-sm hover:border-blue-400 text-3xl text-center" style="font-family: 'Dancing Script', cursive;">Creative Pass</button>
                        </div>
                    </div>

                    <!-- Shapes Tools -->
                    <div id="tab-shapes" class="tab-content hidden grid grid-cols-2 gap-3">
                        <button onclick="addShape('rect')" class="bg-white border border-gray-200 p-4 rounded-xl flex flex-col items-center justify-center hover:border-blue-400 shadow-sm"><div class="w-10 h-10 bg-blue-500 mb-2"></div><span class="text-xs font-bold">Square</span></button>
                        <button onclick="addShape('circle')" class="bg-white border border-gray-200 p-4 rounded-xl flex flex-col items-center justify-center hover:border-blue-400 shadow-sm"><div class="w-10 h-10 bg-red-500 rounded-full mb-2"></div><span class="text-xs font-bold">Circle</span></button>
                        <button onclick="addShape('triangle')" class="bg-white border border-gray-200 p-4 rounded-xl flex flex-col items-center justify-center hover:border-blue-400 shadow-sm"><div class="w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-b-[25px] border-b-yellow-500 mb-2"></div><span class="text-xs font-bold">Triangle</span></button>
                        <button onclick="addShape('line')" class="bg-white border border-gray-200 p-4 rounded-xl flex flex-col items-center justify-center hover:border-blue-400 shadow-sm"><div class="w-12 h-1 bg-gray-800 mb-2 mt-4"></div><span class="text-xs font-bold mt-2">Line</span></button>
                        
                        <div class="col-span-2 mt-4">
                            <input type="file" id="imageUploader" accept="image/*" class="hidden" onchange="uploadCustomImage(event)">
                            <button onclick="document.getElementById('imageUploader').click()" class="w-full bg-indigo-50 border-2 border-dashed border-indigo-300 text-indigo-700 font-black py-4 rounded-xl hover:bg-indigo-100 transition"><i class="fa-solid fa-image text-2xl block mb-1"></i> Upload Photo / Logo</button>
                        </div>
                    </div>

                    <!-- Emojis -->
                    <div id="tab-emojis" class="tab-content hidden">
                        <div class="text-xs font-bold text-gray-500 mb-2 uppercase">Click to add Emojis</div>
                        <div class="emoji-grid bg-white p-2 rounded-lg border shadow-sm">
                            <div class="emoji-item" onclick="addText('🔥', 40, 'Arial')">🔥</div><div class="emoji-item" onclick="addText('⭐', 40, 'Arial')">⭐</div><div class="emoji-item" onclick="addText('👑', 40, 'Arial')">👑</div><div class="emoji-item" onclick="addText('💼', 40, 'Arial')">💼</div><div class="emoji-item" onclick="addText('🎓', 40, 'Arial')">🎓</div>
                            <div class="emoji-item" onclick="addText('🏥', 40, 'Arial')">🏥</div><div class="emoji-item" onclick="addText('📸', 40, 'Arial')">📸</div><div class="emoji-item" onclick="addText('🔒', 40, 'Arial')">🔒</div><div class="emoji-item" onclick="addText('✔️', 40, 'Arial')">✔️</div><div class="emoji-item" onclick="addText('❌', 40, 'Arial')">❌</div>
                            <div class="emoji-item" onclick="addText('❤️', 40, 'Arial')">❤️</div><div class="emoji-item" onclick="addText('✨', 40, 'Arial')">✨</div><div class="emoji-item" onclick="addText('🚀', 40, 'Arial')">🚀</div><div class="emoji-item" onclick="addText('🛡️', 40, 'Arial')">🛡️</div><div class="emoji-item" onclick="addText('💻', 40, 'Arial')">💻</div>
                        </div>
                    </div>

                    <!-- Backgrounds -->
                    <div id="tab-bg" class="tab-content hidden space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase block mb-2">Solid Color</label>
                            <input type="color" onchange="changeBackground(this.value)" class="w-full h-10 p-0 border-0 rounded cursor-pointer">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase block mb-2">Preset Gradients</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="changeBackgroundGradient('blue')" class="h-12 rounded bg-gradient-to-r from-blue-500 to-cyan-400 shadow"></button>
                                <button onclick="changeBackgroundGradient('red')" class="h-12 rounded bg-gradient-to-r from-red-500 to-orange-400 shadow"></button>
                                <button onclick="changeBackgroundGradient('dark')" class="h-12 rounded bg-gradient-to-r from-gray-800 to-black shadow"></button>
                                <button onclick="changeBackgroundGradient('purple')" class="h-12 rounded bg-gradient-to-r from-purple-600 to-pink-500 shadow"></button>
                            </div>
                        </div>
                        <button onclick="changeBackground('#ffffff')" class="w-full bg-white border border-gray-300 py-2 rounded font-bold text-sm text-gray-700">Clear Background</button>
                    </div>

                </div>
            </aside>

            <!-- Editor Canvas Wrapper -->
            <main class="flex-1 flex flex-col relative workspace-bg">
                
                <!-- Properties Bar (Top) -->
                <div id="propertyBar" class="h-14 bg-white border-b border-gray-200 flex items-center px-6 gap-6 opacity-30 pointer-events-none transition-opacity shadow-sm z-10">
                    <div class="text-xs font-black text-gray-400 uppercase tracking-widest">Edit:</div>
                    <!-- Color -->
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-palette text-gray-500"></i>
                        <input type="color" id="objColor" onchange="changeObjectColor(this.value)" class="w-8 h-8 p-0 border-0 rounded cursor-pointer shadow-sm">
                    </div>
                    <div class="w-px h-6 bg-gray-300"></div>
                    
                    <!-- Text Formatting (Only works if text is selected) -->
                    <button onclick="toggleBold()" class="w-8 h-8 rounded hover:bg-gray-100 border border-transparent hover:border-gray-300 text-gray-700 font-bold"><i class="fa-solid fa-bold"></i></button>
                    <button onclick="toggleItalic()" class="w-8 h-8 rounded hover:bg-gray-100 border border-transparent hover:border-gray-300 text-gray-700 font-bold"><i class="fa-solid fa-italic"></i></button>
                    <div class="w-px h-6 bg-gray-300"></div>

                    <!-- Opacity -->
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-droplet text-gray-500" title="Transparency"></i>
                        <input type="range" id="objOpacity" min="0.1" max="1" step="0.1" value="1" oninput="changeObjectOpacity(this.value)" class="w-24 cursor-pointer accent-blue-600">
                    </div>
                    <div class="w-px h-6 bg-gray-300"></div>

                    <!-- Layers & Actions -->
                    <button onclick="moveObject('up')" class="text-gray-700 hover:text-blue-600 font-bold text-xs bg-gray-50 px-3 py-1.5 rounded border"><i class="fa-solid fa-arrow-up mr-1"></i>Front</button>
                    <button onclick="moveObject('down')" class="text-gray-700 hover:text-blue-600 font-bold text-xs bg-gray-50 px-3 py-1.5 rounded border"><i class="fa-solid fa-arrow-down mr-1"></i>Back</button>
                    
                    <button onclick="cloneObject()" class="text-blue-600 hover:text-blue-800 font-bold text-xs ml-auto"><i class="fa-solid fa-copy mr-1"></i>Copy</button>
                    <button onclick="deleteObject()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded font-bold text-xs transition"><i class="fa-solid fa-trash-can mr-1"></i>Delete</button>
                </div>

                <!-- Canvas -->
                <div class="flex-1 flex items-center justify-center overflow-auto p-8">
                    <canvas id="mainCanvas"></canvas>
                </div>

                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-full text-xs font-bold shadow-xl flex items-center gap-2">
                    <i class="fa-solid fa-mouse-pointer text-blue-400"></i> Double-click text to edit. Drag corners to resize. Drag top handle to rotate. <kbd class="bg-gray-700 px-1 rounded ml-1">Del</kbd> to delete.
                </div>
            </main>
        </div>

    </div>

    <!-- SCRIPT ENGINE -->
    <script>
        // ==========================================
        // 1. DATA: CATEGORIES & TEMPLATES
        // ==========================================
        const categories = [
            "All", "Employee Badges", "School ID Cards", "Doctor ID Cards", 
            "Firefighter ID Cards", "Law Enforcement Badges", "Medical ID Cards", 
            "Novelty ID Cards", "Press Pass", "Attorney ID Cards", "Church Badges", 
            "Service Dog ID Cards"
        ];

        // Template Database (Styles map to Fabric.js drawing functions below)
        const templateDB = [
            { id: 1, type: 'Employee Badges', style: 'corp_blue', color: 'bg-blue-600', icon: 'fa-building', title: 'Corporate Blue HD' },
            { id: 2, type: 'Employee Badges', style: 'corp_dark', color: 'bg-gray-800', icon: 'fa-id-badge', title: 'Executive Dark Pro' },
            { id: 3, type: 'Doctor ID Cards', style: 'doc_red', color: 'bg-red-500', icon: 'fa-user-doctor', title: 'Hospital Surgeon Pass' },
            { id: 4, type: 'School ID Cards', style: 'school_yellow', color: 'bg-yellow-400', icon: 'fa-graduation-cap', title: 'Modern Student ID' },
            { id: 5, type: 'Press Pass', style: 'press_black', color: 'bg-black', icon: 'fa-camera', title: 'Official Press Media' },
            { id: 6, type: 'Law Enforcement Badges', style: 'police_shield', color: 'bg-slate-900', icon: 'fa-shield-halved', title: 'Security Officer Badge' },
            { id: 7, type: 'Medical ID Cards', style: 'doc_red', color: 'bg-teal-500', icon: 'fa-notes-medical', title: 'Clinic Nurse Pass' },
            { id: 8, type: 'Novelty ID Cards', style: 'school_yellow', color: 'bg-purple-500', icon: 'fa-masks-theater', title: 'VIP Backstage Event' },
            { id: 9, type: 'Firefighter ID Cards', style: 'fire_red', color: 'bg-orange-600', icon: 'fa-fire-extinguisher', title: 'Fire Dept Official' },
            { id: 10, type: 'Service Dog ID Cards', style: 'corp_blue', color: 'bg-indigo-400', icon: 'fa-dog', title: 'Service Animal Pass' }
        ];

        // ==========================================
        // 2. UI INITIALIZATION (SIDEBAR & GALLERY)
        // ==========================================
        const catList = document.getElementById('categoryList');
        const grid = document.getElementById('templateGrid');
        const searchInput = document.getElementById('searchInput');

        // Render Categories
        categories.forEach((cat, index) => {
            const li = document.createElement('li');
            li.className = `sidebar-item px-5 py-3 text-sm font-bold text-gray-500 flex items-center gap-3 ${index === 0 ? 'active' : ''}`;
            li.innerHTML = `<i class="fa-solid fa-angle-right text-[10px] opacity-40"></i> ${cat}`;
            li.onclick = () => filterTemplates(cat, li);
            catList.appendChild(li);
        });

        function renderGallery(filter = "All", searchQuery = "") {
            grid.innerHTML = "";
            document.getElementById('currentCategoryTitle').innerText = searchQuery ? `Search: "${searchQuery}"` : (filter === "All" ? "All Premium Templates" : filter);
            
            let filtered = templateDB;
            if(filter !== "All") filtered = filtered.filter(t => t.type === filter);
            if(searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = templateDB.filter(t => t.title.toLowerCase().includes(q) || t.type.toLowerCase().includes(q));
            }
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400"><i class="fa-solid fa-magnifying-glass-minus text-6xl mb-4 text-blue-200"></i><h3 class="text-xl font-bold">No templates found. Try another category!</h3></div>`;
                return;
            }

            // Render visual cards for gallery
            filtered.forEach(t => {
                const card = document.createElement('div');
                card.className = "template-card bg-white p-3 rounded-2xl border border-gray-200 flex flex-col shadow-sm";
                card.onclick = () => openEditor(t.style);
                
                // CSS visual representation of the template
                card.innerHTML = `
                    <div class="w-full aspect-[54/85] rounded-xl ${t.color} mb-3 flex items-center justify-center relative overflow-hidden shadow-inner">
                        <div class="absolute top-0 w-full h-1/3 bg-white/20"></div>
                        <div class="w-12 h-12 rounded-full bg-white/30 backdrop-blur-sm border-2 border-white flex items-center justify-center shadow-lg z-10"><i class="fa-solid ${t.icon} text-white text-xl"></i></div>
                    </div>
                    <h4 class="font-black text-gray-800 text-sm truncate px-1">${t.title}</h4>
                    <p class="text-[10px] font-bold text-blue-500 uppercase mt-1 px-1">${t.type}</p>
                `;
                grid.appendChild(card);
            });
        }

        function filterTemplates(cat, element) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            searchInput.value = "";
            renderGallery(cat);
        }

        searchInput.addEventListener('input', (e) => {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            renderGallery("All", e.target.value);
        });

        renderGallery();

        // ==========================================
        // 3. FABRIC.JS EDITOR ENGINE
        // ==========================================
        let canvas = new fabric.Canvas('mainCanvas', { preserveObjectStacking: true });
        
        // CR80 Dimensions (Scaled x4 for High-Res Edit/Print)
        const CANVAS_W = 342.4; 
        const CANVAS_H = 539.2;

        function openEditor(templateId) {
            document.getElementById('galleryWorkspace').classList.add('hidden');
            document.getElementById('searchBarWrapper').classList.add('hidden');
            document.getElementById('btnDownload').classList.remove('hidden');
            
            const workspace = document.getElementById('editorWorkspace');
            workspace.classList.remove('hidden');
            workspace.classList.add('flex');

            // Setup Canvas
            canvas.setWidth(CANVAS_W);
            canvas.setHeight(CANVAS_H);
            canvas.clear();
            canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));

            // Load Template Objects
            buildTemplate(templateId);
        }

        function closeEditor() {
            document.getElementById('editorWorkspace').classList.add('hidden');
            document.getElementById('editorWorkspace').classList.remove('flex');
            document.getElementById('galleryWorkspace').classList.remove('hidden');
            document.getElementById('searchBarWrapper').classList.remove('hidden');
            document.getElementById('searchBarWrapper').classList.add('flex');
            document.getElementById('btnDownload').classList.add('hidden');
        }

        // --- Template Builders (Draws Fabric Objects) ---
        function buildTemplate(type) {
            if(type === 'blank') return;

            // Common Placeholder Profile Image
            const addProfilePic = (top, left) => {
                fabric.Image.fromURL('https://cdn-icons-png.flaticon.com/512/149/149071.png', function(img) {
                    img.scaleToWidth(120);
                    img.set({ left: left, top: top, originX: 'center', originY: 'center', clipPath: new fabric.Circle({ radius: 60, originX: 'center', originY: 'center' }) });
                    canvas.add(img); canvas.renderAll();
                });
            };

            if(type === 'corp_blue') {
                let rect = new fabric.Rect({ left: 0, top: 0, width: CANVAS_W, height: 150, fill: '#2563eb', selectable: false });
                let title = new fabric.IText('COMPANY NAME', { left: CANVAS_W/2, top: 40, fontFamily: 'Oswald', fontSize: 28, fill: '#ffffff', originX: 'center', fontWeight: 'bold' });
                let name = new fabric.IText('Employee Name', { left: CANVAS_W/2, top: 250, fontFamily: 'Arial', fontSize: 24, fill: '#1f2937', originX: 'center', fontWeight: 'bold' });
                let role = new fabric.IText('Software Developer', { left: CANVAS_W/2, top: 280, fontFamily: 'Arial', fontSize: 16, fill: '#3b82f6', originX: 'center', fontWeight: 'bold' });
                let idText = new fabric.IText('ID: EMP-2026', { left: CANVAS_W/2, top: 340, fontFamily: 'Arial', fontSize: 14, fill: '#4b5563', originX: 'center' });
                canvas.add(rect, title, name, role, idText);
                addProfilePic(150, CANVAS_W/2);
            } 
            else if(type === 'doc_red') {
                let sideRect = new fabric.Rect({ left: 0, top: 0, width: 40, height: CANVAS_H, fill: '#ef4444', selectable: false });
                let title = new fabric.IText('GENERAL HOSPITAL', { left: 60, top: 40, fontFamily: 'Arial', fontSize: 24, fill: '#1e3a8a', fontWeight: 'bold' });
                let name = new fabric.IText('Dr. Aman Sharma', { left: 60, top: 220, fontFamily: 'Arial', fontSize: 24, fill: '#1f2937', fontWeight: 'bold' });
                let role = new fabric.IText('Chief Cardiologist', { left: 60, top: 255, fontFamily: 'Arial', fontSize: 16, fill: '#ef4444', fontWeight: 'bold' });
                let dept = new fabric.IText('Dept: Cardiology', { left: 60, top: 320, fontFamily: 'Arial', fontSize: 14, fill: '#4b5563' });
                canvas.add(sideRect, title, name, role, dept);
                addProfilePic(140, 120);
            }
            else if(type === 'school_yellow') {
                canvas.setBackgroundColor('#fef08a', canvas.renderAll.bind(canvas));
                let topRect = new fabric.Rect({ left: 0, top: 0, width: CANVAS_W, height: 100, fill: '#1e3a8a', selectable: false });
                let title = new fabric.IText('PUBLIC SCHOOL', { left: CANVAS_W/2, top: 40, fontFamily: 'Playfair Display', fontSize: 32, fill: '#fef08a', originX: 'center', fontWeight: 'bold' });
                let name = new fabric.IText('Student Name', { left: CANVAS_W/2, top: 280, fontFamily: 'Arial', fontSize: 28, fill: '#1e3a8a', originX: 'center', fontWeight: 'bold' });
                let cls = new fabric.IText('Class: 10th - Sec A', { left: CANVAS_W/2, top: 320, fontFamily: 'Arial', fontSize: 16, fill: '#4b5563', originX: 'center', fontWeight: 'bold' });
                let roll = new fabric.IText('Roll No: 45', { left: CANVAS_W/2, top: 350, fontFamily: 'Arial', fontSize: 16, fill: '#4b5563', originX: 'center', fontWeight: 'bold' });
                let bottomRect = new fabric.Rect({ left: 0, top: CANVAS_H-40, width: CANVAS_W, height: 40, fill: '#1e3a8a', selectable: false });
                canvas.add(topRect, title, name, cls, roll, bottomRect);
                addProfilePic(180, CANVAS_W/2);
            }
            else if(type === 'press_black') {
                canvas.setBackgroundColor('#000000', canvas.renderAll.bind(canvas));
                let border = new fabric.Rect({ left: 10, top: 10, width: CANVAS_W-20, height: CANVAS_H-20, fill: 'transparent', stroke: '#eab308', strokeWidth: 5, selectable: false });
                let title = new fabric.IText('PRESS', { left: CANVAS_W/2, top: 60, fontFamily: 'Oswald', fontSize: 60, fill: '#eab308', originX: 'center', fontWeight: 'bold' });
                let subtitle = new fabric.IText('MEDIA PASS', { left: CANVAS_W/2, top: 130, fontFamily: 'Arial', fontSize: 20, fill: '#ffffff', originX: 'center', backgroundColor: '#ef4444' });
                let name = new fabric.IText('Vikram Singh', { left: CANVAS_W/2, top: 350, fontFamily: 'Arial', fontSize: 28, fill: '#ffffff', originX: 'center', fontWeight: 'bold' });
                let role = new fabric.IText('Photojournalist', { left: CANVAS_W/2, top: 390, fontFamily: 'Arial', fontSize: 18, fill: '#9ca3af', originX: 'center' });
                canvas.add(border, title, subtitle, name, role);
                addProfilePic(240, CANVAS_W/2);
            }
            // Defaults to empty for others in this demo to save space, but logic applies identically.
            else {
                let title = new fabric.IText('Custom Template', { left: CANVAS_W/2, top: 60, fontFamily: 'Arial', fontSize: 28, fill: '#1f2937', originX: 'center', fontWeight: 'bold' });
                canvas.add(title);
                addProfilePic(200, CANVAS_W/2);
            }
            canvas.renderAll();
        }

        // ==========================================
        // EDITOR TOOLS LOGIC
        // ==========================================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.querySelectorAll('.tool-tab').forEach(el => { el.classList.remove('bg-blue-50', 'text-blue-600'); el.classList.add('text-gray-500'); });
            event.currentTarget.classList.remove('text-gray-500');
            event.currentTarget.classList.add('bg-blue-50', 'text-blue-600');
        }

        // Top Property Bar Activation
        canvas.on('selection:created', updatePropertyBar);
        canvas.on('selection:updated', updatePropertyBar);
        canvas.on('selection:cleared', () => {
            document.getElementById('propertyBar').classList.add('opacity-30', 'pointer-events-none');
        });

        function updatePropertyBar() {
            document.getElementById('propertyBar').classList.remove('opacity-30', 'pointer-events-none');
            const obj = canvas.getActiveObject();
            if(obj) {
                document.getElementById('objColor').value = obj.fill || '#000000';
                document.getElementById('objOpacity').value = obj.opacity || 1;
            }
        }

        // --- Add Elements ---
        function addText(text, size, font, weight) {
            const iText = new fabric.IText(text, { left: CANVAS_W/2, top: CANVAS_H/2, fontFamily: font, fontSize: size, fontWeight: weight || 'normal', fill: '#1f2937', originX: 'center', originY: 'center', cornerColor: '#2563eb', cornerStyle: 'circle' });
            canvas.add(iText); canvas.setActiveObject(iText); canvas.renderAll();
        }

        function addShape(type) {
            let shape;
            const props = { left: CANVAS_W/2, top: CANVAS_H/2, fill: '#3b82f6', originX: 'center', originY: 'center', cornerColor: '#2563eb', cornerStyle: 'circle' };
            if(type === 'rect') shape = new fabric.Rect({ ...props, width: 100, height: 100 });
            else if(type === 'circle') shape = new fabric.Circle({ ...props, radius: 50, fill: '#ef4444' });
            else if(type === 'triangle') shape = new fabric.Triangle({ ...props, width: 100, height: 100, fill: '#eab308' });
            else if(type === 'line') shape = new fabric.Line([50, 100, 200, 100], { left: CANVAS_W/2, top: CANVAS_H/2, stroke: '#1f2937', strokeWidth: 5, cornerColor: '#2563eb', cornerStyle: 'circle' });
            canvas.add(shape); canvas.setActiveObject(shape); canvas.renderAll();
        }

        function uploadCustomImage(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(150);
                    img.set({ left: CANVAS_W/2, top: CANVAS_H/2, originX: 'center', originY: 'center', cornerColor: '#2563eb', cornerStyle: 'circle' });
                    canvas.add(img); canvas.setActiveObject(img); canvas.renderAll();
                });
            };
            reader.readAsDataURL(file); e.target.value = "";
        }

        function changeBackground(color) { canvas.setBackgroundColor(color, canvas.renderAll.bind(canvas)); }
        function changeBackgroundGradient(type) {
            let gradient;
            if(type === 'blue') gradient = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: CANVAS_W, y2: CANVAS_H }, colorStops: [{ offset: 0, color: '#3b82f6' }, { offset: 1, color: '#22d3ee' }] });
            else if(type === 'red') gradient = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: CANVAS_W, y2: CANVAS_H }, colorStops: [{ offset: 0, color: '#ef4444' }, { offset: 1, color: '#f97316' }] });
            else if(type === 'dark') gradient = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: CANVAS_W, y2: CANVAS_H }, colorStops: [{ offset: 0, color: '#1f2937' }, { offset: 1, color: '#000000' }] });
            else if(type === 'purple') gradient = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: CANVAS_W, y2: CANVAS_H }, colorStops: [{ offset: 0, color: '#9333ea' }, { offset: 1, color: '#ec4899' }] });
            canvas.setBackgroundColor(gradient, canvas.renderAll.bind(canvas));
        }

        // --- Object Properties ---
        function changeObjectColor(color) {
            const obj = canvas.getActiveObject(); if(!obj) return;
            if(obj.type === 'line') obj.set('stroke', color); else obj.set('fill', color);
            canvas.renderAll();
        }
        function changeObjectOpacity(val) { const obj = canvas.getActiveObject(); if(obj) { obj.set('opacity', parseFloat(val)); canvas.renderAll(); } }
        function toggleBold() { const obj = canvas.getActiveObject(); if(obj && obj.type === 'i-text') { obj.set('fontWeight', obj.fontWeight === 'bold' ? 'normal' : 'bold'); canvas.renderAll(); } }
        function toggleItalic() { const obj = canvas.getActiveObject(); if(obj && obj.type === 'i-text') { obj.set('fontStyle', obj.fontStyle === 'italic' ? 'normal' : 'italic'); canvas.renderAll(); } }
        function moveObject(dir) { const obj = canvas.getActiveObject(); if(!obj) return; if(dir === 'up') canvas.bringForward(obj); else canvas.sendBackwards(obj); canvas.renderAll(); }
        function deleteObject() { const obj = canvas.getActiveObject(); if(obj) { canvas.remove(obj); canvas.discardActiveObject(); } }
        function cloneObject() {
            const obj = canvas.getActiveObject(); if(!obj) return;
            obj.clone(function(cloned) {
                cloned.set({ left: obj.left + 20, top: obj.top + 20, evented: true });
                canvas.add(cloned); canvas.setActiveObject(cloned); canvas.renderAll();
            });
        }

        // Keyboard Delete
        window.addEventListener('keydown', function(e) { if(e.key === 'Delete' || e.key === 'Backspace') deleteObject(); });

        // --- Download / Save ---
        function downloadCard() {
            canvas.discardActiveObject(); canvas.renderAll(); // Remove selection border
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 1, multiplier: 3 }); // High Res Export
            const link = document.createElement('a'); link.download = 'Custom_ID_Card.jpg'; link.href = dataURL;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
